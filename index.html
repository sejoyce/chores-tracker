<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chore Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- Sign-in screen (shown before auth, hidden after) -->
<div id="auth-screen" class="auth-screen">
  <div class="auth-card">
    <h1>Chore Tracker</h1>
    <p>Sign in to access your chores.</p>
    <button class="btn-google" id="sign-in-btn">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 6.294C4.672 4.169 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </button>
    <p class="auth-note" id="auth-error" style="display:none;color:#c2714a"></p>
  </div>
</div>

<!-- Main app (hidden until auth passes) -->
<div id="app" style="display:none">

<header>
  <div class="header-inner">
    <div>
      <h1>Chore Tracker</h1>
      <p>your shared chore tracker</p>
    </div>
    <div class="user-chip" id="user-chip">
      <img id="user-avatar" src="" alt="" width="28" height="28">
      <span id="user-name"></span>
      <button class="btn-ghost sign-out-btn" id="sign-out-btn">Sign out</button>
    </div>
  </div>
</header>

<!-- Setup Modal (first time) -->
<div class="modal-overlay" id="setup-modal">
  <div class="modal">
    <h2>Welcome Home 🏡</h2>
    <p>Enter your names to personalise your chore tabs.</p>
    <div class="form-field">
      <label>Your name</label>
      <input type="text" id="setup-p1" placeholder="e.g. Alex">
    </div>
    <div class="form-field">
      <label>Partner's name</label>
      <input type="text" id="setup-p2" placeholder="e.g. Jordan">
    </div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="saveSetup()">Let's go →</button>
    </div>
  </div>
</div>

<!-- Rename Tab Modal -->
<div class="modal-overlay" id="rename-modal">
  <div class="modal">
    <h2>Edit Tab</h2>
    <p>Update the name and emoji for this person's tab.</p>
    <div class="form-field">
      <label>Name</label>
      <input type="text" id="rename-input" placeholder="e.g. Jordan">
    </div>
    <div class="form-field">
      <label>Emoji</label>
      <div class="emoji-picker" id="emoji-picker"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeRename()">Cancel</button>
      <button class="btn-primary" onclick="saveRename()">Save</button>
    </div>
  </div>
</div>

<!-- Add Frequency Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">Add Frequency</h2>
    <p>Create a new chore category with its own reset schedule.</p>
    <div class="form-field">
      <label>Name</label>
      <input type="text" id="freq-name" placeholder="e.g. Biweekly, Every 2 Months…">
    </div>
    <div class="form-field">
      <label>Reset every</label>
      <div style="display:flex;gap:0.5rem">
        <input type="number" id="freq-days" min="1" max="999" placeholder="30" style="width:90px">
        <select id="freq-unit">
          <option value="1">days</option>
          <option value="7">weeks</option>
          <option value="30">months</option>
          <option value="91">quarters</option>
        </select>
      </div>
    </div>
    <div class="form-field">
      <label>Color</label>
      <div class="color-swatches" id="color-swatches"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveFrequency()">Save</button>
    </div>
  </div>
</div>

<!-- Tabs -->
<div class="tabs-wrap">
  <div class="tabs" id="tabs">
    <button class="tab-btn active" onclick="switchTab('shared')" id="tab-shared">
      <span class="tab-emoji">🏠</span>Shared
    </button>
    <button class="tab-btn" onclick="switchTab('p1')" id="tab-p1">
      <span class="tab-emoji" id="tab-p1-emoji">👤</span><span id="tab-p1-label">Person 1</span>
      <span class="tab-rename" onclick="openRename('p1',event)" title="Rename">✎</span>
    </button>
    <button class="tab-btn" onclick="switchTab('p2')" id="tab-p2">
      <span class="tab-emoji" id="tab-p2-emoji">👤</span><span id="tab-p2-label">Person 2</span>
      <span class="tab-rename" onclick="openRename('p2',event)" title="Rename">✎</span>
    </button>
  </div>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <button class="btn-primary" onclick="openAddFreq()">＋ New Frequency</button>
  <button class="btn-secondary" onclick="resetAll()">↺ Reset All Overdue</button>
</div>

<!-- Main columns area -->
<div class="columns" id="columns"></div>

</div><!-- /#app -->

<!--
  ═══════════════════════════════════════════════════════════════
  FIREBASE — secrets injected by GitHub Actions at deploy time.
  Do not replace the YOUR_... placeholders manually here.
  ═══════════════════════════════════════════════════════════════
-->
<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, onSnapshot, setDoc }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey:            "YOUR_API_KEY",
    authDomain:        "YOUR_PROJECT.firebaseapp.com",
    projectId:         "YOUR_PROJECT_ID",
    storageBucket:     "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId:             "YOUR_APP_ID"
  };

  const ALLOWED_EMAILS = [
    "YOUR_EMAIL_1",
    "YOUR_EMAIL_2"
  ];

  const isConfigured = !firebaseConfig.apiKey.startsWith("YOUR_");

  if (!isConfigured) {
    console.warn("Firebase not configured — running in local-only mode.");
    window._firebaseReady = Promise.resolve(null);
    // Show app immediately in local mode
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  } else {
    const app    = initializeApp(firebaseConfig);
    const db     = getFirestore(app);
    const auth   = getAuth(app);
    const docRef = doc(db, "chores", "shared-state");

    // ── Auth ────────────────────────────────────────────────────────────────

    // Sign-in button
    document.getElementById('sign-in-btn').addEventListener('click', async () => {
      const provider = new GoogleAuthProvider();
      try {
        await signInWithPopup(auth, provider);
      } catch (err) {
        const el = document.getElementById('auth-error');
        el.textContent = 'Sign-in failed: ' + err.message;
        el.style.display = 'block';
      }
    });

    // Sign-out button
    document.getElementById('sign-out-btn').addEventListener('click', () => {
      signOut(auth);
    });

    // Auth state drives app visibility
    window._firebaseReady = new Promise((resolve) => {
      onAuthStateChanged(auth, (user) => {
        if (!user) {
          // Not signed in — show auth screen, hide app
          document.getElementById('auth-screen').style.display = 'flex';
          document.getElementById('app').style.display = 'none';
          resolve(null);
          return;
        }

        // Check allow-list
        if (!ALLOWED_EMAILS.includes(user.email)) {
          signOut(auth);
          const el = document.getElementById('auth-error');
          el.textContent = `${user.email} is not authorised to access this app.`;
          el.style.display = 'block';
          resolve(null);
          return;
        }

        // Authorised — show app, update user chip
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('user-name').textContent   = user.displayName || user.email;
        const avatar = document.getElementById('user-avatar');
        if (user.photoURL) { avatar.src = user.photoURL; avatar.style.display = 'inline'; }
        else { avatar.style.display = 'none'; }

        // ── Firestore ────────────────────────────────────────────────────────

        window._firebaseSave = async (stateObj) => {
          const raw = JSON.stringify(stateObj);
          window._lastSavedRaw = raw;
          await setDoc(docRef, { data: raw });
        };

        // Resolve with initial snapshot, then keep listening
        let resolved = false;
        const unsub = onSnapshot(docRef, (snap) => {
          if (!snap.exists()) {
            if (!resolved) { resolved = true; resolve(null); }
            return;
          }
          const raw = snap.data().data;
          if (!resolved) {
            resolved = true;
            window._lastSavedRaw = raw;
            resolve(JSON.parse(raw));
            // Switch to live listener after first load
            unsub();
            onSnapshot(docRef, (snap) => {
              if (!snap.exists()) return;
              const rawRemote = snap.data().data;
              if (rawRemote !== window._lastSavedRaw) {
                window._lastSavedRaw = rawRemote;
                if (typeof loadRemoteState === "function") loadRemoteState(JSON.parse(rawRemote));
              }
            });
          }
        }, (err) => {
          console.error("Firestore error:", err);
          if (!resolved) { resolved = true; resolve(null); }
        });
      });
    });
  }
</script>

<!-- App scripts (plain JS, order matters) -->
<script src="js/state.js"></script>
<script src="js/drag.js"></script>
<script src="js/render.js"></script>
<script src="js/modals.js"></script>
<script>
  (window._firebaseReady || Promise.resolve(null)).then((remoteState) => {
    if (remoteState) {
      state = remoteState;
      localStorage.setItem('chore-tracker-v3', JSON.stringify(state));
    }
    checkSetup();
    renderAll();
  });
</script>

</body>
</html>
